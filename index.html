 
  
<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<title>Life Skill Tree</title>  
<style>  
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');  
  
  :root {  
    --bg: #050508;  
    --panel: #0a0a12;  
    --finance: #a855f7;  
    --finance-dim: #3b1a5e;  
    --speech: #3b82f6;  
    --speech-dim: #1a2a5e;  
    --purpose: #eab308;  
    --purpose-dim: #4a3a00;  
    --hockey: #ef4444;  
    --hockey-dim: #5e1a1a;  
    --knowledge: #22c55e;  
    --knowledge-dim: #0f3a1f;  
    --health: #f97316;  
    --health-dim: #4a2200;  
  }  
  
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }  
  
  body {  
    background: var(--bg);  
    color: #fff;  
    font-family: 'Rajdhani', sans-serif;  
    min-height: 100vh;  
    overflow-x: hidden;  
  }  
  
  /* Starfield */  
  body::before {  
    content: '';  
    position: fixed;  
    inset: 0;  
    background-image:  
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),  
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),  
      radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),  
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),  
      radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),  
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),  
      radial-gradient(1px 1px at 92% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),  
      radial-gradient(1px 1px at 45% 95%, rgba(255,255,255,0.2) 0%, transparent 100%),  
      radial-gradient(1px 1px at 65% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),  
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);  
    pointer-events: none;  
    z-index: 0;  
  }  
  
  /* ── OVERVIEW SCREEN ── */  
  #overview {  
    position: relative;  
    z-index: 1;  
    min-height: 100vh;  
    padding: 0 16px 40px;  
  }  
  
  .top-bar {  
    display: flex;  
    align-items: center;  
    justify-content: space-between;  
    padding: 20px 0 10px;  
  }  
  
  .game-title {  
    font-family: 'Orbitron', monospace;  
    font-size: 18px;  
    font-weight: 900;  
    letter-spacing: 3px;  
    background: linear-gradient(90deg, #a855f7, #3b82f6, #22c55e, #eab308, #f97316, #ef4444);  
    -webkit-background-clip: text;  
    -webkit-text-fill-color: transparent;  
    background-clip: text;  
    text-shadow: none;  
    filter: drop-shadow(0 0 8px rgba(168,85,247,0.5));  
  }  
  
  .total-xp {  
    font-family: 'Orbitron', monospace;  
    font-size: 11px;  
    color: rgba(255,255,255,0.5);  
    letter-spacing: 1px;  
  }  
  
  .total-xp span {  
    color: #fff;  
    font-weight: 700;  
  }  
  
  .overview-subtitle {  
    text-align: center;  
    color: rgba(255,255,255,0.3);  
    font-size: 13px;  
    letter-spacing: 2px;  
    text-transform: uppercase;  
    margin-bottom: 28px;  
    margin-top: 4px;  
  }  
  
  /* Branch grid */  
  .branches-grid {  
    display: grid;  
    grid-template-columns: 1fr 1fr;  
    gap: 14px;  
  }  
  
  .branch-card {  
    background: var(--panel);  
    border: 1px solid rgba(255,255,255,0.06);  
    border-radius: 16px;  
    padding: 18px 14px 16px;  
    cursor: pointer;  
    position: relative;  
    overflow: hidden;  
    transition: transform 0.18s, border-color 0.18s;  
    -webkit-tap-highlight-color: transparent;  
  }  
  
  .branch-card:active { transform: scale(0.96); }  
  
  .branch-card::before {  
    content: '';  
    position: absolute;  
    inset: 0;  
    border-radius: 16px;  
    opacity: 0;  
    transition: opacity 0.3s;  
  }  
  
  .branch-card:hover::before { opacity: 1; }  
  
  .branch-card[data-branch="finance"] { border-color: rgba(168,85,247,0.25); }  
  .branch-card[data-branch="finance"]::before { background: radial-gradient(ellipse at top left, rgba(168,85,247,0.08), transparent 70%); }  
  .branch-card[data-branch="speech"] { border-color: rgba(59,130,246,0.25); }  
  .branch-card[data-branch="speech"]::before { background: radial-gradient(ellipse at top left, rgba(59,130,246,0.08), transparent 70%); }  
  .branch-card[data-branch="purpose"] { border-color: rgba(234,179,8,0.25); }  
  .branch-card[data-branch="purpose"]::before { background: radial-gradient(ellipse at top left, rgba(234,179,8,0.08), transparent 70%); }  
  .branch-card[data-branch="hockey"] { border-color: rgba(239,68,68,0.25); }  
  .branch-card[data-branch="hockey"]::before { background: radial-gradient(ellipse at top left, rgba(239,68,68,0.08), transparent 70%); }  
  .branch-card[data-branch="knowledge"] { border-color: rgba(34,197,94,0.25); }  
  .branch-card[data-branch="knowledge"]::before { background: radial-gradient(ellipse at top left, rgba(34,197,94,0.08), transparent 70%); }  
  .branch-card[data-branch="health"] { border-color: rgba(249,115,22,0.25); }  
  .branch-card[data-branch="health"]::before { background: radial-gradient(ellipse at top left, rgba(249,115,22,0.08), transparent 70%); }  
  
  .branch-icon {  
    font-size: 28px;  
    margin-bottom: 8px;  
    display: block;  
    filter: drop-shadow(0 0 6px currentColor);  
  }  
  
  .branch-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 11px;  
    font-weight: 700;  
    letter-spacing: 2px;  
    text-transform: uppercase;  
    margin-bottom: 10px;  
  }  
  
  .branch-card[data-branch="finance"] .branch-name { color: var(--finance); text-shadow: 0 0 10px var(--finance); }  
  .branch-card[data-branch="speech"] .branch-name { color: var(--speech); text-shadow: 0 0 10px var(--speech); }  
  .branch-card[data-branch="purpose"] .branch-name { color: var(--purpose); text-shadow: 0 0 10px var(--purpose); }  
  .branch-card[data-branch="hockey"] .branch-name { color: var(--hockey); text-shadow: 0 0 10px var(--hockey); }  
  .branch-card[data-branch="knowledge"] .branch-name { color: var(--knowledge); text-shadow: 0 0 10px var(--knowledge); }  
  .branch-card[data-branch="health"] .branch-name { color: var(--health); text-shadow: 0 0 10px var(--health); }  
  
  .branch-progress-bar {  
    height: 4px;  
    background: rgba(255,255,255,0.06);  
    border-radius: 2px;  
    overflow: hidden;  
    margin-bottom: 6px;  
  }  
  
  .branch-progress-fill {  
    height: 100%;  
    border-radius: 2px;  
    transition: width 0.6s ease;  
  }  
  
  .branch-card[data-branch="finance"] .branch-progress-fill { background: var(--finance); box-shadow: 0 0 8px var(--finance); }  
  .branch-card[data-branch="speech"] .branch-progress-fill { background: var(--speech); box-shadow: 0 0 8px var(--speech); }  
  .branch-card[data-branch="purpose"] .branch-progress-fill { background: var(--purpose); box-shadow: 0 0 8px var(--purpose); }  
  .branch-card[data-branch="hockey"] .branch-progress-fill { background: var(--hockey); box-shadow: 0 0 8px var(--hockey); }  
  .branch-card[data-branch="knowledge"] .branch-progress-fill { background: var(--knowledge); box-shadow: 0 0 8px var(--knowledge); }  
  .branch-card[data-branch="health"] .branch-progress-fill { background: var(--health); box-shadow: 0 0 8px var(--health); }  
  
  .branch-stats {  
    font-size: 11px;  
    color: rgba(255,255,255,0.4);  
    letter-spacing: 1px;  
  }  
  
  .branch-stats strong {  
    color: rgba(255,255,255,0.8);  
  }  
  
  /* ── BRANCH DETAIL SCREEN ── */  
  #branch-view {  
    display: none;  
    position: fixed;  
    inset: 0;  
    z-index: 100;  
    background: var(--bg);  
    overflow-y: auto;  
    -webkit-overflow-scrolling: touch;  
  }  
  
  #branch-view.active { display: block; }  
  
  .branch-header {  
    position: sticky;  
    top: 0;  
    z-index: 10;  
    background: rgba(5,5,8,0.95);  
    backdrop-filter: blur(20px);  
    -webkit-backdrop-filter: blur(20px);  
    padding: 16px 20px 14px;  
    border-bottom: 1px solid rgba(255,255,255,0.05);  
    display: flex;  
    align-items: center;  
    gap: 14px;  
  }  
  
  .back-btn {  
    background: rgba(255,255,255,0.06);  
    border: none;  
    border-radius: 10px;  
    color: rgba(255,255,255,0.6);  
    font-size: 18px;  
    width: 38px;  
    height: 38px;  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    cursor: pointer;  
    flex-shrink: 0;  
    font-family: 'Rajdhani', sans-serif;  
  }  
  
  .branch-header-info { flex: 1; }  
  
  .branch-header-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 16px;  
    font-weight: 900;  
    letter-spacing: 2px;  
  }  
  
  .branch-header-xp {  
    font-size: 12px;  
    color: rgba(255,255,255,0.4);  
    margin-top: 2px;  
    letter-spacing: 1px;  
  }  
  
  /* Tree layout */  
  .tree-container {  
    padding: 24px 16px 60px;  
    position: relative;  
  }  
  
  .tier-section {  
    margin-bottom: 8px;  
  }  
  
  .tier-label {  
    font-family: 'Orbitron', monospace;  
    font-size: 9px;  
    letter-spacing: 4px;  
    color: rgba(255,255,255,0.2);  
    text-transform: uppercase;  
    margin-bottom: 12px;  
    padding-left: 4px;  
    display: flex;  
    align-items: center;  
    gap: 8px;  
  }  
  
  .tier-label::after {  
    content: '';  
    flex: 1;  
    height: 1px;  
    background: rgba(255,255,255,0.05);  
  }  
  
  .skills-row {  
    display: flex;  
    gap: 10px;  
    flex-wrap: wrap;  
    margin-bottom: 6px;  
  }  
  
  /* Connector lines */  
  .connector {  
    display: flex;  
    justify-content: center;  
    margin-bottom: 6px;  
    gap: 40px;  
  }  
  
  .connector-line {  
    width: 2px;  
    height: 28px;  
    background: rgba(255,255,255,0.08);  
    border-radius: 1px;  
    position: relative;  
    transition: background 0.4s;  
  }  
  
  .connector-line.lit {  
    background: currentColor;  
    box-shadow: 0 0 8px currentColor;  
  }  
  
  /* Skill node */  
  .skill-node {  
    background: rgba(10,10,18,0.9);  
    border: 1.5px solid rgba(255,255,255,0.08);  
    border-radius: 14px;  
    padding: 12px 12px 10px;  
    cursor: pointer;  
    position: relative;  
    transition: all 0.22s;  
    flex: 1;  
    min-width: 130px;  
    max-width: 200px;  
    -webkit-tap-highlight-color: transparent;  
  }  
  
  .skill-node:active { transform: scale(0.96); }  
  
  .skill-node.locked {  
    opacity: 0.45;  
    cursor: default;  
  }  
  
  .skill-node.completed {  
    border-color: currentColor;  
  }  
  
  .skill-node.available {  
    border-color: currentColor;  
    opacity: 0.85;  
    animation: pulse-border 2.5s infinite;  
  }  
  
  @keyframes pulse-border {  
    0%, 100% { box-shadow: 0 0 6px currentColor, inset 0 0 6px rgba(255,255,255,0.03); }  
    50% { box-shadow: 0 0 18px currentColor, inset 0 0 10px rgba(255,255,255,0.05); }  
  }  
  
  .skill-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 9.5px;  
    font-weight: 700;  
    letter-spacing: 1px;  
    margin-bottom: 5px;  
    line-height: 1.3;  
  }  
  
  .skill-path {  
    display: inline-block;  
    font-family: 'Orbitron', monospace;  
    font-size: 7px;  
    letter-spacing: 1.5px;  
    text-transform: uppercase;  
    color: rgba(255,255,255,0.5);  
    background: rgba(255,255,255,0.05);  
    border: 1px solid rgba(255,255,255,0.08);  
    border-radius: 999px;  
    padding: 2px 6px;  
    margin-bottom: 6px;  
  }  

  .skill-mission {  
    font-size: 11px;  
    color: rgba(255,255,255,0.45);  
    line-height: 1.4;  
    margin-bottom: 8px;  
  }  
  
  .skill-tier-dots {  
    display: flex;  
    gap: 4px;  
    align-items: center;  
  }  
  
  .tier-dot {  
    width: 7px;  
    height: 7px;  
    border-radius: 50%;  
    background: rgba(255,255,255,0.1);  
    border: 1px solid rgba(255,255,255,0.15);  
    transition: all 0.4s;  
  }  
  
  .tier-dot.filled {  
    background: currentColor;  
    box-shadow: 0 0 6px currentColor, 0 0 12px currentColor;  
    border-color: currentColor;  
  }  
  
  .tier-dot.filled.tier-2 {  
    box-shadow: 0 0 8px currentColor, 0 0 16px currentColor, 0 0 24px currentColor;  
  }  
  
  .tier-dot.filled.tier-3 {  
    box-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 35px currentColor;  
    width: 9px;  
    height: 9px;  
  }  
  
  .skill-status-badge {  
    position: absolute;  
    top: 8px;  
    right: 8px;  
    font-size: 13px;  
  }  
  
  /* ── MISSION MODAL ── */  
  #mission-modal {  
    display: none;  
    position: fixed;  
    inset: 0;  
    z-index: 200;  
    background: rgba(0,0,0,0.85);  
    backdrop-filter: blur(12px);  
    -webkit-backdrop-filter: blur(12px);  
    align-items: flex-end;  
    justify-content: center;  
    padding: 0;  
  }  
  
  #mission-modal.active {  
    display: flex;  
    animation: modal-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);  
  }  
  
  @keyframes modal-in {  
    from { opacity: 0; transform: translateY(40px); }  
    to { opacity: 1; transform: translateY(0); }  
  }  
  
  .modal-sheet {  
    background: #0d0d18;  
    border: 1px solid rgba(255,255,255,0.08);  
    border-radius: 28px 28px 0 0;  
    padding: 10px 24px 44px;  
    width: 100%;  
    max-width: 600px;  
    position: relative;  
    touch-action: pan-y;
    transition: transform 0.22s ease, opacity 0.22s ease;
    will-change: transform;
  }  

  .modal-sheet.dragging {
    transition: none;
  }
  
  .modal-drag-handle {  
    width: 40px;  
    height: 4px;  
    background: rgba(255,255,255,0.15);  
    border-radius: 2px;  
    margin: 10px auto 20px;  
  }  
  
  .modal-skill-name {  
    font-family: 'Orbitron', monospace;  
    font-size: 15px;  
    font-weight: 900;  
    letter-spacing: 2px;  
    margin-bottom: 4px;  
  }  
  
  .modal-tier-label {  
    font-size: 11px;  
    color: rgba(255,255,255,0.35);  
    letter-spacing: 2px;  
    text-transform: uppercase;  
    margin-bottom: 16px;  
  }  
  
  .modal-mission-header {  
    font-family: 'Orbitron', monospace;  
    font-size: 9px;  
    letter-spacing: 3px;  
    color: rgba(255,255,255,0.25);  
    text-transform: uppercase;  
    margin-bottom: 8px;  
  }  
  
  .modal-mission-text {  
    font-size: 15px;  
    line-height: 1.6;  
    color: rgba(255,255,255,0.8);  
    margin-bottom: 24px;  
    padding: 14px;  
    background: rgba(255,255,255,0.03);  
    border-radius: 12px;  
    border: 1px solid rgba(255,255,255,0.06);  
  }  
  
  .modal-tier-progress {  
    display: flex;  
    gap: 8px;  
    margin-bottom: 24px;  
    align-items: center;  
  }  
  
  .modal-tier-dot {  
    width: 12px;  
    height: 12px;  
    border-radius: 50%;  
    background: rgba(255,255,255,0.1);  
    border: 1.5px solid rgba(255,255,255,0.2);  
    transition: all 0.4s;  
  }  
  
  .modal-tier-dot.filled {  
    background: currentColor;  
    box-shadow: 0 0 10px currentColor, 0 0 20px currentColor;  
    border-color: currentColor;  
  }  
  
  .modal-tier-text {  
    font-size: 12px;  
    color: rgba(255,255,255,0.35);  
    letter-spacing: 1px;  
    margin-left: 4px;  
  }  
  
  .modal-complete-btn {  
    width: 100%;  
    padding: 16px;  
    border: none;  
    border-radius: 16px;  
    font-family: 'Orbitron', monospace;  
    font-size: 12px;  
    font-weight: 700;  
    letter-spacing: 3px;  
    text-transform: uppercase;  
    cursor: pointer;  
    transition: all 0.2s;  
    margin-bottom: 10px;  
  }  
  
  .modal-complete-btn:active { transform: scale(0.97); }  
  
  .modal-close-btn {  
    width: 100%;  
    padding: 12px;  
    border: none;  
    background: transparent;  
    color: rgba(255,255,255,0.3);  
    font-family: 'Rajdhani', sans-serif;  
    font-size: 14px;  
    cursor: pointer;  
    letter-spacing: 1px;  
  }  
  
  /* ── UNLOCK FLASH ── */  
  #unlock-flash {  
    display: none;  
    position: fixed;  
    inset: 0;  
    z-index: 300;  
    pointer-events: none;  
    align-items: center;  
    justify-content: center;  
    flex-direction: column;  
    gap: 12px;  
  }  
  
  #unlock-flash.active {  
    display: flex;  
    animation: flash-anim 1.6s forwards;  
  }  
  
  @keyframes flash-anim {  
    0% { opacity: 0; }  
    15% { opacity: 1; }  
    70% { opacity: 1; }  
    100% { opacity: 0; }  
  }  
  
  .flash-ring {  
    width: 120px;  
    height: 120px;  
    border-radius: 50%;  
    border: 3px solid currentColor;  
    box-shadow: 0 0 30px currentColor, 0 0 60px currentColor, inset 0 0 30px rgba(255,255,255,0.1);  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    font-size: 40px;  
    animation: ring-pulse 0.4s ease-out;  
  }  
  
  @keyframes ring-pulse {  
    0% { transform: scale(0.5); }  
    100% { transform: scale(1); }  
  }  
  
  .flash-text {  
    font-family: 'Orbitron', monospace;  
    font-size: 14px;  
    font-weight: 900;  
    letter-spacing: 4px;  
    color: #fff;  
    text-shadow: 0 0 20px currentColor;  
    text-align: center;  
  }  
  
  .flash-subtext {  
    font-size: 12px;  
    color: rgba(255,255,255,0.5);  
    letter-spacing: 2px;  
    text-align: center;  
  }  
</style>  
</head>  
<body>  
  
<!-- ── OVERVIEW SCREEN ── -->  
<div id="overview">  
  <div class="top-bar">  
    <div class="game-title">LIFE TREE</div>  
    <div class="total-xp">TOTAL XP <span id="total-xp-display">0</span></div>  
  </div>  
  <div class="overview-subtitle">SELECT A BRANCH</div>  
  
  <div class="branches-grid" id="branches-grid"></div>  
</div>  
  
<!-- ── BRANCH DETAIL SCREEN ── -->  
<div id="branch-view">  
  <div class="branch-header">  
    <button class="back-btn" onclick="closeBranch()">←</button>  
    <div class="branch-header-info">  
      <div class="branch-header-name" id="bv-name"></div>  
      <div class="branch-header-xp" id="bv-xp"></div>  
    </div>  
  </div>  
  <div class="tree-container" id="tree-container"></div>  
</div>  
  
<!-- ── MISSION MODAL ── -->  
<div id="mission-modal" onclick="closeMissionModal(event)">  
  <div class="modal-sheet" id="modal-sheet">  
    <div class="modal-drag-handle"></div>  
    <div class="modal-skill-name" id="modal-skill-name"></div>  
    <div class="modal-tier-label" id="modal-tier-label"></div>  
    <div class="modal-mission-header">MISSION</div>  
    <div class="modal-mission-text" id="modal-mission-text"></div>  
    <div class="modal-tier-progress" id="modal-tier-progress"></div>  
    <button class="modal-complete-btn" id="modal-complete-btn" onclick="completeMission()">  
      ✓ MISSION COMPLETE  
    </button>  
    <button class="modal-close-btn" onclick="closeMissionModal()">CLOSE</button>  
  </div>  
</div>  
  
<!-- ── UNLOCK FLASH ── -->  
<div id="unlock-flash">  
  <div class="flash-ring" id="flash-ring">⚡</div>  
  <div class="flash-text" id="flash-text">SKILL UNLOCKED</div>  
  <div class="flash-subtext" id="flash-subtext"></div>  
</div>  
  
<script>  
// ═══════════════════════════════════════════  
// DATA  
// ═══════════════════════════════════════════  
const BRANCHES = {  
  finance: {
    name: 'Finance',
    icon: '💜',
    emoji: '💰',

// ═══════════════════════════════════════════  
// STATE  
// ═══════════════════════════════════════════  
let state = {};  
let currentBranch = null;  
let currentSkill = null;  
  
function loadState() {  
  // Mobile Safari can keep old/corrupt localStorage from previous versions.
  // This makes startup impossible to break: bad saved data is ignored.
  try {  
    const saved = localStorage.getItem('lifeTreeState');  
    if (saved) {
      const parsed = JSON.parse(saved);
      state = parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
    }
  } catch(e) {
    state = {};
  }  
  // Ensure every branch and every skill has a valid progress object.
  Object.keys(BRANCHES).forEach(bKey => {  
    if (!state[bKey] || typeof state[bKey] !== 'object' || Array.isArray(state[bKey])) state[bKey] = {};  
    BRANCHES[bKey].skills.forEach(sk => {  
      const savedSkill = state[bKey][sk.id];
      if (!savedSkill || typeof savedSkill !== 'object') {
        state[bKey][sk.id] = { tier: 0 };
      } else {
        let tier = Number(savedSkill.tier || 0);
        if (!Number.isFinite(tier)) tier = 0;
        state[bKey][sk.id].tier = Math.max(0, Math.min(3, Math.floor(tier)));
      }
    });  
  });  
}  
  
function saveState() {  
  try { localStorage.setItem('lifeTreeState', JSON.stringify(state)); } catch(e) {}  
}  
  
// ═══════════════════════════════════════════  
// HELPERS  
// ═══════════════════════════════════════════  
function getRequirementProgress(bKey, requirement) {  
  if (typeof requirement === 'string') {  
    return { id: requirement, needed: 3 };  
  }  
  return { id: requirement.id, needed: requirement.tier || 3 };  
}  

function getSavedTier(bKey, skillId) {
  const branchState = state[bKey];
  if (!branchState || typeof branchState !== 'object') return 0;
  const skillState = branchState[skillId];
  if (!skillState || typeof skillState !== 'object') return 0;
  const tier = Number(skillState.tier || 0);
  return Number.isFinite(tier) ? Math.max(0, Math.min(3, Math.floor(tier))) : 0;
}

function getSkillStatus(bKey, skill) {  
  const t = getSavedTier(bKey, skill.id);  
  const maxTier = 3;  
  if (t >= maxTier) return 'completed';  
  if (!skill.requires || skill.requires.length === 0) return t === 0 ? 'available' : 'in-progress';  
  const allDone = skill.requires.every(req => {  
    const rule = getRequirementProgress(bKey, req);  
    return getSavedTier(bKey, rule.id) >= rule.needed;  
  });  
  if (!allDone) return 'locked';  
  return t === 0 ? 'available' : 'in-progress';  
}  

function getMissionText(bKey, skill) {  
  const currentTier = getSavedTier(bKey, skill.id);  
  if (skill.missions && skill.missions.length) {  
    const index = Math.min(currentTier, skill.missions.length - 1);  
    if (currentTier >= 3) return skill.missions[skill.missions.length - 1];  
    return skill.missions[index];  
  }  
  return skill.mission || '';  
}  

function getRequirementText(bKey, skill) {  
  if (!skill.requires || skill.requires.length === 0) return '';  
  const branch = BRANCHES[bKey];  
  const lookup = {};
  branch.skills.forEach(s => { lookup[s.id] = s; });  
  return skill.requires.map(req => {  
    const rule = getRequirementProgress(bKey, req);  
    const requiredSkill = lookup[rule.id];  
    const name = requiredSkill ? requiredSkill.name : rule.id;  
    const current = getSavedTier(bKey, rule.id);  
    const done = current >= rule.needed ? '✓' : '•';  
    return `${done} ${name} Tier ${rule.needed}`;  
  }).join('\\n');  
}  

function getBranchProgress(bKey) {  
  const branch = BRANCHES[bKey];  
  let completed = 0;  
  branch.skills.forEach(sk => {  
    if (getSavedTier(bKey, sk.id) >= 3) completed++;  
  });  
  return { completed, total: branch.skills.length, pct: Math.round((completed / branch.skills.length) * 100) };  
}  
  
function getTotalXP() {  
  let xp = 0;  
  Object.keys(BRANCHES).forEach(bKey => {  
    BRANCHES[bKey].skills.forEach(sk => {  
      xp += getSavedTier(bKey, sk.id) * 100;  
    });  
  });  
  return xp;  
}  
  
// ═══════════════════════════════════════════  
// OVERVIEW  
// ═══════════════════════════════════════════  
function renderOverview() {  
  document.getElementById('total-xp-display').textContent = getTotalXP();  
  const grid = document.getElementById('branches-grid');  
  grid.innerHTML = '';  
  
  Object.keys(BRANCHES).forEach(bKey => {  
    const branch = BRANCHES[bKey];  
    const prog = getBranchProgress(bKey);  
    const card = document.createElement('div');  
    card.className = 'branch-card';  
    card.setAttribute('data-branch', bKey);  
    card.onclick = () => openBranch(bKey);  
    card.innerHTML = `  
      <span class="branch-icon">${branch.emoji}</span>  
      <div class="branch-name">${branch.name}</div>  
      <div class="branch-progress-bar">  
        <div class="branch-progress-fill" style="width:${prog.pct}%"></div>  
      </div>  
      <div class="branch-stats"><strong>${prog.completed}</strong>/${prog.total} skills</div>  
    `;  
    grid.appendChild(card);  
  });  
}  
  
// ═══════════════════════════════════════════  
// BRANCH VIEW  
// ═══════════════════════════════════════════  
function openBranch(bKey) {  
  currentBranch = bKey;  
  const branch = BRANCHES[bKey];  
  const color = branch.color;  
  
  document.getElementById('bv-name').style.color = color;  
  document.getElementById('bv-name').style.textShadow = `0 0 12px ${color}`;  
  document.getElementById('bv-name').textContent = branch.name.toUpperCase();  
  
  const prog = getBranchProgress(bKey);  
  document.getElementById('bv-xp').textContent = `${prog.completed * 300} XP · ${prog.completed}/${prog.total} SKILLS`;  
  
  renderTree(bKey);  
  document.getElementById('branch-view').classList.add('active');  
  document.getElementById('branch-view').scrollTop = 0;  
}  
  
function closeBranch() {  
  document.getElementById('branch-view').classList.remove('active');  
  currentBranch = null;  
  renderOverview();  
}  
  
function renderTree(bKey) {  
  const branch = BRANCHES[bKey];  
  const color = branch.color;  
  const container = document.getElementById('tree-container');  
  container.innerHTML = '';  
  
  // Group by tier  
  const tiers = {};  
  branch.skills.forEach(sk => {  
    if (!tiers[sk.tier]) tiers[sk.tier] = [];  
    tiers[sk.tier].push(sk);  
  });  
  
  const tierNames = { 1: 'Tier I — Foundation', 2: 'Tier II — Developing', 3: 'Tier III — Advanced', 4: 'Tier IV — Elite' };  
  
  Object.keys(tiers).sort().forEach((tierNum, tierIdx) => {  
    // Connector from previous tier  
    if (tierIdx > 0) {  
      const conn = document.createElement('div');  
      conn.className = 'connector';  
      const prevTierSkills = tiers[Object.keys(tiers).sort()[tierIdx-1]];  
      const anyPrevDone = prevTierSkills.some(sk => getSavedTier(bKey, sk.id) >= 3);  
      conn.innerHTML = `<div class="connector-line ${anyPrevDone ? 'lit' : ''}" style="color:${color}; ${anyPrevDone ? `background:${color}; box-shadow: 0 0 8px ${color}` : ''}"></div>`;  
      container.appendChild(conn);  
    }  
  
    const section = document.createElement('div');  
    section.className = 'tier-section';  
  
    const label = document.createElement('div');  
    label.className = 'tier-label';  
    label.style.color = `${color}88`;  
    label.textContent = tierNames[tierNum];  
    section.appendChild(label);  
  
    const row = document.createElement('div');  
    row.className = 'skills-row';  
  
    tiers[tierNum].forEach(skill => {  
      const status = getSkillStatus(bKey, skill);  
      const tierProgress = getSavedTier(bKey, skill.id);  
  
      const node = document.createElement('div');  
      node.className = `skill-node ${status}`;  
      node.style.color = color;  
      if (status !== 'locked') {  
        node.style.borderColor = color;  
        if (status === 'completed') {  
          const intensity = `0 0 10px ${color}, 0 0 20px ${color}88, 0 0 40px ${color}44`;  
          node.style.boxShadow = intensity;  
        } else if (status === 'available' || status === 'in-progress') {  
          node.style.boxShadow = `0 0 8px ${color}66`;  
        }  
      }  
  
      // Locked skills are still clickable so you can preview the mission,
      // but the completion button stays disabled until requirements are met.
      node.onclick = () => openMission(bKey, skill);  
  
      const statusIcon = status === 'completed' ? '✦' : status === 'locked' ? '🔒' : status === 'available' ? '◈' : '◉';  
  
      // Tier dots  
      let dotsHtml = '';  
      for (let d = 1; d <= 3; d++) {  
        const filled = tierProgress >= d;  
        const tierClass = filled ? `filled tier-${Math.min(tierProgress, 3)}` : '';  
        dotsHtml += `<div class="tier-dot ${tierClass}" style="${filled ? `background:${color}; border-color:${color}` : ''}"></div>`;  
      }  
  
      const missionText = getMissionText(bKey, skill);  
      const pathHtml = skill.path ? `<div class="skill-path">${skill.path}</div>` : '';  

      node.innerHTML = `  
        <div class="skill-status-badge">${statusIcon}</div>  
        <div class="skill-name" style="color:${status !== 'locked' ? color : 'rgba(255,255,255,0.3)'}">${skill.name}</div>  
        ${pathHtml}  
        <div class="skill-mission">${missionText.substring(0, 70)}${missionText.length > 70 ? '…' : ''}</div>  
        <div class="skill-tier-dots">${dotsHtml}</div>  
      `;  
  
      row.appendChild(node);  
    });  
  
    section.appendChild(row);  
    container.appendChild(section);  
  });  
}  
  
// ═══════════════════════════════════════════  
// MISSION MODAL  
// ═══════════════════════════════════════════  
function openMission(bKey, skill) {  
  currentBranch = bKey;  
  currentSkill = skill;  
  
  const branch = BRANCHES[bKey];  
  const color = branch.color;  
  const status = getSkillStatus(bKey, skill);  
  const tierProgress = getSavedTier(bKey, skill.id);  
  
  document.getElementById('modal-skill-name').textContent = skill.name;  
  document.getElementById('modal-skill-name').style.color = color;  
  document.getElementById('modal-skill-name').style.textShadow = `0 0 12px ${color}`;  
  
  const tierNames = ['', 'Tier I', 'Tier II', 'Tier III', 'Tier IV'];  
  const pathLabel = skill.path ? ` · ${skill.path.toUpperCase()}` : '';  
  document.getElementById('modal-tier-label').textContent = `${tierNames[skill.tier]} · ${branch.name.toUpperCase()}${pathLabel}`;  

  const missionText = getMissionText(bKey, skill);  
  const reqText = status === 'locked' ? `

UNLOCK REQUIREMENTS:
${getRequirementText(bKey, skill)}` : '';  
  document.getElementById('modal-mission-text').textContent = missionText + reqText;  
  
  // Tier dots  
  let dotsHtml = '';  
  for (let d = 1; d <= 3; d++) {  
    const filled = tierProgress >= d;  
    dotsHtml += `<div class="modal-tier-dot ${filled ? 'filled' : ''}" style="${filled ? `background:${color}; border-color:${color}; box-shadow: 0 0 10px ${color}, 0 0 20px ${color}` : 'color:' + color}"></div>`;  
  }  
  dotsHtml += `<span class="modal-tier-text">${tierProgress}/3 TIERS</span>`;  
  document.getElementById('modal-tier-progress').innerHTML = dotsHtml;  
  document.getElementById('modal-tier-progress').style.color = color;  
  
  const btn = document.getElementById('modal-complete-btn');  
  if (status === 'completed') {  
    btn.textContent = '✦ MASTERED';  
    btn.style.background = `linear-gradient(135deg, ${color}33, ${color}22)`;  
    btn.style.color = color;  
    btn.style.border = `1px solid ${color}44`;  
    btn.style.boxShadow = `0 0 20px ${color}33`;  
    btn.disabled = true;  
    btn.style.cursor = 'default';  
  } else if (status === 'locked') {  
    btn.textContent = '🔒 LOCKED';  
    btn.style.background = 'rgba(255,255,255,0.04)';  
    btn.style.color = 'rgba(255,255,255,0.3)';  
    btn.style.border = '1px solid rgba(255,255,255,0.08)';  
    btn.style.boxShadow = 'none';  
    btn.disabled = true;  
    btn.style.cursor = 'default';  
  } else {  
    btn.textContent = '✓ MISSION COMPLETE';  
    btn.style.background = `linear-gradient(135deg, ${color}, ${color}cc)`;  
    btn.style.color = '#000';  
    btn.style.border = 'none';  
    btn.style.boxShadow = `0 0 20px ${color}88, 0 0 40px ${color}44`;  
    btn.disabled = false;  
    btn.style.cursor = 'pointer';  
  }  
  
  const sheet = document.getElementById('modal-sheet');
  sheet.classList.remove('dragging');
  sheet.style.transform = '';
  sheet.style.opacity = '';
  document.getElementById('mission-modal').classList.add('active');  
}  
  
function closeMissionModal(e) {  
  if (e && e.target !== document.getElementById('mission-modal')) return;  
  const sheet = document.getElementById('modal-sheet');
  sheet.classList.remove('dragging');
  sheet.style.transform = '';
  sheet.style.opacity = '';
  document.getElementById('mission-modal').classList.remove('active');  
  currentSkill = null;  
}  
  
function completeMission() {  
  if (!currentBranch || !currentSkill) return;  
  const bKey = currentBranch;  
  const skill = currentSkill;  
  const branch = BRANCHES[bKey];  
  
  const current = getSavedTier(bKey, skill.id);  
  const status = getSkillStatus(bKey, skill);
  if (current >= 3 || status === 'locked') return;  
  
  state[bKey][skill.id].tier = current + 1;  
  saveState();  
  
  document.getElementById('mission-modal').classList.remove('active');  
  currentSkill = null;  
  
  // Show unlock flash  
  showUnlockFlash(branch.color, branch.emoji, skill.name, getSavedTier(bKey, skill.id));  
  
  // Re-render  
  setTimeout(() => {  
    renderTree(bKey);  
    renderOverview();  
    const prog = getBranchProgress(bKey);  
    document.getElementById('bv-xp').textContent = `${prog.completed * 300} XP · ${prog.completed}/${prog.total} SKILLS`;  
  }, 200);  
}  
  
function showUnlockFlash(color, emoji, skillName, tier) {  
  const tierLabels = ['', 'TIER I UNLOCKED', 'TIER II UNLOCKED', 'TIER III — MASTERED'];  
  const flash = document.getElementById('unlock-flash');  
  const ring = document.getElementById('flash-ring');  
  const text = document.getElementById('flash-text');  
  const sub = document.getElementById('flash-subtext');  
  
  ring.style.color = color;  
  ring.style.borderColor = color;  
  ring.style.boxShadow = `0 0 30px ${color}, 0 0 60px ${color}, inset 0 0 30px rgba(255,255,255,0.1)`;  
  ring.textContent = emoji;  
  text.textContent = tierLabels[tier];  
  text.style.textShadow = `0 0 20px ${color}`;  
  sub.textContent = skillName.toUpperCase();  
  
  flash.classList.add('active');  
  setTimeout(() => flash.classList.remove('active'), 1800);  
}  
  
// ═══════════════════════════════════════════  
// SWIPE-DOWN TO CLOSE MISSION SHEET
// ═══════════════════════════════════════════  
let modalTouchStartY = 0;
let modalTouchCurrentY = 0;
let modalTouchActive = false;

function setupMissionSwipeClose() {
  const sheet = document.getElementById('modal-sheet');
  const modal = document.getElementById('mission-modal');
  if (!sheet || !modal) return;

  sheet.addEventListener('touchstart', (e) => {
    if (!modal.classList.contains('active')) return;
    modalTouchStartY = e.touches[0].clientY;
    modalTouchCurrentY = modalTouchStartY;
    modalTouchActive = true;
    sheet.classList.add('dragging');
  }, { passive: true });

  sheet.addEventListener('touchmove', (e) => {
    if (!modalTouchActive) return;
    modalTouchCurrentY = e.touches[0].clientY;
    const dragDistance = Math.max(0, modalTouchCurrentY - modalTouchStartY);
    if (dragDistance > 0) {
      sheet.style.transform = `translateY(${dragDistance}px)`;
      sheet.style.opacity = String(Math.max(0.45, 1 - dragDistance / 420));
    }
  }, { passive: true });

  sheet.addEventListener('touchend', () => {
    if (!modalTouchActive) return;
    const dragDistance = Math.max(0, modalTouchCurrentY - modalTouchStartY);
    modalTouchActive = false;
    sheet.classList.remove('dragging');

    if (dragDistance > 90) {
      closeMissionModal();
    } else {
      sheet.style.transform = '';
      sheet.style.opacity = '';
    }
  });

  sheet.addEventListener('touchcancel', () => {
    modalTouchActive = false;
    sheet.classList.remove('dragging');
    sheet.style.transform = '';
    sheet.style.opacity = '';
  });
}

// ═══════════════════════════════════════════  
// INIT  
// ═══════════════════════════════════════════  
function showStartupError(error) {
  const grid = document.getElementById('branches-grid');
  if (!grid) return;
  grid.innerHTML = `<div style="grid-column:1/-1; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.45); border-radius:16px; padding:16px; color:#fff; line-height:1.45;">
    <div style="font-family:Orbitron,monospace; color:#ef4444; margin-bottom:8px;">APP LOAD ERROR</div>
    <div>The saved progress data on this device may be corrupted. Tap reset below, then refresh the file.</div>
    <button onclick="localStorage.removeItem('lifeTreeState'); location.reload();" style="margin-top:12px; padding:12px 14px; border:0; border-radius:12px; background:#ef4444; color:#000; font-family:Orbitron,monospace; font-weight:700;">RESET SAVED PROGRESS</button>
  </div>`;
  console.error('Life Tree startup error:', error);
}

function initLifeTree() {
  try {
    loadState();
    renderOverview();
    setupMissionSwipeClose();
  } catch (error) {
    showStartupError(error);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initLifeTree);
} else {
  initLifeTree();
}

</script>
